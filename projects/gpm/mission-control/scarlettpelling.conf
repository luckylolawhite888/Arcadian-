server {
    listen 80;
    server_name scarlettpelling.com www.scarlettpelling.com;

    root /var/www/scarlettpelling.com/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /dashboard {
        alias /var/www/scarlettpelling.com/html;
        try_files dashboard.html =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
