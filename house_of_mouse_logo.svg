<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#c0392b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Icon: gradient rounded square -->
  <rect x="8" y="18" width="56" height="56" rx="14" ry="14" fill="url(#g)" filter="url(#s)"/>

  <!-- White mouse silhouette -->
  <ellipse cx="36" cy="54" rx="13" ry="15" fill="#f2ede6"/>
  <ellipse cx="27" cy="40" rx="7" ry="9" fill="#f2ede6" transform="rotate(-18, 27, 40)"/>
  <ellipse cx="45" cy="40" rx="7" ry="9" fill="#f2ede6" transform="rotate(18, 45, 40)"/>

  <!-- Text -->
  <text x="82" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="11" letter-spacing="4.5" fill="#7a7369">HOUSE OF</text>
  <text x="82" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#f2ede6" letter-spacing="1">M</text>
  <text x="106" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="300" fill="#f2ede6">ouse</text>
</svg>
